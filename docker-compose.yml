services:
  db:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: secondbite
    ports:
      - "5435:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: emilysilvachagas/project_secondbite:backend-sprint2
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/secondbite
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      JWT_SECRET_KEY: minhasenhagigantecommaisde32caracteresextrasparapassar256bits12345
      FILE_PATH: /app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: emilysilvachagas/project_secondbite:frontend-sprint2
    ports:
      - "80:80"
    depends_on:
      - backend
