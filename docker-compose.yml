services:
  db:
    image: postgres:18
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER} #coloque seu user aqui para testar na sua maquina
      POSTGRES_PASSWORD: ${POSTGRES_USER} #coloque sua senha aqui para testar na sua maquina
      POSTGRES_DB: secondbite
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/data

  backend:
    image: emilysilvachagas/project_secondbite:backend-sprint1
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      POSTGRES_USER: ${POSTGRES_USER} #coloque seu user aqui para testar na sua maquina
      POSTGRES_PASSWORD: ${POSTGRES_USER} #coloque sua senha aqui para testar na sua maquina
      POSTGRES_DB: secondbite
      JWT_SECRET_KEY: ${JWT_SECRET_KEY} #coloque uma senha grande de 32 caracteres aqui para testar na sua maquina
      POSTGRES_HOST: db
    depends_on:
      - db

  frontend:
    image: emilysilvachagas/project_secondbite:frontend-sprint1
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:




