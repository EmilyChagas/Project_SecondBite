server:
  servlet:
    context-path: /secondbite/api

spring:
  application:
    name: secondbite
  datasource:
    url: jdbc:postgresql://localhost:5435/secondbite
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    #      ddl-auto: none
    properties:
      hibernate.format_sql: true

jwt:
  secret: ${JWT_SECRET_KEY}

app:
  image:
    upload-dir: ${FILE_PATH}